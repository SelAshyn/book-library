services:
  - type: web
    name: book-library-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: book-library-backend.onrender.com
      - key: PORT
        value: "8000"

  - type: pserv
    name: book-library-db
    env: postgres
    region: oregon
    plan: starter
    ipAllowList: []
    databaseName: booklibrary
    user: booklibrary
